<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 72" role="img" aria-label="Calcutta Port Trust — now Syama Prasad Mookerjee Port">
  <!-- Anchor symbol -->
  <g transform="translate(10,8)">
    <!-- Anchor ring at top -->
    <circle cx="24" cy="12" r="9" fill="none" stroke="#1a4f8a" stroke-width="3.5"/>
    <!-- Anchor vertical shaft -->
    <line x1="24" y1="21" x2="24" y2="57" stroke="#1a4f8a" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Anchor crossbar -->
    <line x1="8" y1="30" x2="40" y2="30" stroke="#1a4f8a" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Anchor flukes curved -->
    <path d="M24 57 Q10 54 8 44" stroke="#1a4f8a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M24 57 Q38 54 40 44" stroke="#1a4f8a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Stock ring cross bar ends (small circles) -->
    <circle cx="8" cy="30" r="3" fill="#1a4f8a"/>
    <circle cx="40" cy="30" r="3" fill="#1a4f8a"/>
  </g>

  <!-- "CPT" initials -->
  <text x="72" y="36" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="26" fill="#1a4f8a" letter-spacing="2">CPT</text>

  <!-- Full name -->
  <text x="72" y="52" font-family="Arial, sans-serif" font-size="9" fill="#1a4f8a" letter-spacing="0.5" font-weight="700">CALCUTTA PORT TRUST</text>
  <text x="72" y="64" font-family="Arial, sans-serif" font-size="8" fill="#888888" letter-spacing="0.3">Now: Syama Prasad Mookerjee Port</text>
</svg>
