<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 120" role="img" aria-label="PNP Engineering Works">
  
  <!-- "PNP" Heavy Industrial Mark -->
  <g transform="translate(10, 15)">
    <!-- First 'P' - Left -->
    <rect x="0" y="0" width="20" height="90" fill="#0f172a" />
    <path d="M 20 0 h 20 a 25 25 0 0 1 25 25 a 25 25 0 0 1 -25 25 h -20 z M 20 18 h 15 a 7 7 0 0 0 7 -7 a 7 7 0 0 0 -7 -7 h -15 z" fill="#0f172a" fill-rule="evenodd"/>

    <!-- 'N' - Middle (Amber) -->
    <rect x="80" y="0" width="18" height="90" fill="#eab308" />
    <polygon points="98,0 128,90 146,90 116,0" fill="#eab308" />
    <rect x="146" y="0" width="18" height="90" fill="#eab308" />

    <!-- Second 'P' - Right -->
    <rect x="180" y="0" width="20" height="90" fill="#0f172a" />
    <path d="M 200 0 h 20 a 25 25 0 0 1 25 25 a 25 25 0 0 1 -25 25 h -20 z M 200 18 h 15 a 7 7 0 0 0 7 -7 a 7 7 0 0 0 -7 -7 h -15 z" fill="#0f172a" fill-rule="evenodd"/>
  </g>

  <!-- Wordmark -->
  <text x="270" y="55" font-family="'Arial Black', 'Inter', sans-serif" font-weight="900" font-size="46" fill="#0f172a" letter-spacing="-1">PNP</text>
  <text x="375" y="55" font-family="'Arial Black', 'Inter', sans-serif" font-weight="900" font-size="26" fill="#d97706" letter-spacing="1">ENGINEERING</text>
  
  <!-- Thick Industrial Divider Line -->
  <rect x="270" y="70" width="290" height="4" fill="#0f172a" />
  <rect x="370" y="70" width="80" height="4" fill="#eab308" />

  <!-- Subtext -->
  <text x="270" y="95" font-family="Arial, sans-serif" font-weight="800" font-size="13" fill="#64748b" letter-spacing="4.5">WORKS (P) LTD.</text>
</svg>
